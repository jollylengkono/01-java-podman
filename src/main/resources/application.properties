# Defaults work for local dev; env vars override at container runtime
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}

# Hibernate recreates the schema on each startup — keeps state predictable while learning
spring.jpa.hibernate.ddl-auto=create

# data.sql must run after Hibernate creates the table, not before
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
